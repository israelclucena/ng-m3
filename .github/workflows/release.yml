name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta.*'

jobs:
  publish:
    name: Publish @israelclucena/core to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance attestations 🔒
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core lib
        run: pnpm exec nx build core --configuration=production

      - name: Run tests
        run: pnpm exec nx test core --watchAll=false --passWithNoTests

      - name: Publish to npmjs.com
        run: pnpm exec nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
