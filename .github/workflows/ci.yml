name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint core lib
        run: npx nx lint core --max-warnings=0 || true

      - name: Lint dashboard
        run: npx nx lint dashboard --max-warnings=0 || true

  # ── Job 2: Build & Unit Test ───────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      # Expose dist path for dependent jobs
      dist-ready: ${{ steps.build-core.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (non-blocking)
        run: npm audit --audit-level=high || true

      - name: Build core lib
        id: build-core
        run: npx nx build core

      - name: Build dashboard
        run: npx nx build dashboard

      - name: Run unit tests
        run: npx nx test core --watchAll=false --passWithNoTests --coverageReporters=lcov

      - name: Type-check core
        run: npx nx run core:type-check || true

      - name: Type-check dashboard
        run: npx tsc --project apps/dashboard/tsconfig.app.json --noEmit || true

      # Cache dist for E2E job
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-dashboard
          path: dist/apps/dashboard
          retention-days: 1
          if-no-files-found: ignore

  # ── Job 3: E2E Tests (Playwright, headless) ────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Only run on push to main (skip on PRs to keep them fast)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build dashboard for E2E
        run: npx nx build dashboard --configuration=development

      - name: Run E2E smoke tests (Chromium)
        run: |
          npx playwright test \
            --config=e2e/playwright.config.ts \
            --project=chromium \
            --reporter=list \
            --timeout=30000 || true
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
