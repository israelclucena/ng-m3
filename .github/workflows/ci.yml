name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build core lib
        run: npx nx build core
      - name: Build dashboard
        run: npx nx build dashboard
      - name: Run tests
        run: npx nx test core --watchAll=false --passWithNoTests
      - name: Check for TypeScript errors
        run: npx nx run core:type-check || true
